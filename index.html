<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Campus Life</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
      <a href="library.html"><i class="fas fa-book"></i> Library</a>
      <a href="store.html"><i class="fas fa-shopping-cart"></i> Store</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <input type="text" placeholder="🔍 Search anything...">
      <div class="top-actions">
        <button onclick="toggleDarkMode()" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
        <img src="https://i.pravatar.cc/40" class="avatar" alt="prof">
      </div>
    </header>

    <!-- Welcome -->
    <section class="welcome">
      <h1>Welcome Back, <span id="userName"></span></h1>
      <p>Here’s what’s happening today on campus.</p>
    </section>

    <!-- Stats -->
    <section class="cards">

      <div class="card">
        <h3><i class="fas fa-book"></i> Books Borrowed</h3>
        <p id="dashboardBooks">0</p>
      </div>

      <div class="card">
        <h3><i class="fas fa-tasks"></i> Pending Tasks</h3>
        <p id="dashboardTasks">0</p>
      </div>

      <div class="card">
        <h3><i class="fas fa-shopping-cart"></i> Cart Items</h3>
        <p id="dashboardCart">0</p>
      </div>

      <div class="card">
        <h3><i class="fas fa-money-bill-wave"></i> Total Cart Value</h3>
        <p>KES <span id="dashboardTotal">0</span></p>
      </div>

    </section>

    <!-- Quick Actions -->
    <section class="actions">
      <h2>Quick Actions</h2>
      <div class="action-buttons">
        <button onclick="window.location.href='tasks.html'">
          <i class="fas fa-plus"></i> Add Task
        </button>

        <button onclick="window.location.href='library.html'">
          <i class="fas fa-book-open"></i> Reserve Book
        </button>

        <button onclick="window.location.href='store.html'">
          <i class="fas fa-credit-card"></i> Pay Fees
        </button>
      </div>
    </section>

    <!-- Activity + Schedule -->
    <section class="grid">

      <!-- Recent Activity -->
      <div class="panel">
        <h2>Recent Activity</h2>
        <ul id="activityList"></ul>
      </div>

      <!-- Today's Schedule -->
      <div class="panel">
        <h2>Today’s Schedule</h2>
        <ul id="scheduleList"></ul>
      </div>

    </section>

  </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>

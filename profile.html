<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Smart Campus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
      <a href="library.html"><i class="fas fa-book"></i> Library</a>
      <a href="store.html"><i class="fas fa-shopping-cart"></i> Store</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">
      <h2>👤 Profile</h2>
      <button onclick="toggleDarkMode()">🌙</button>
    </header>

    <section class="task-form">
      <h3>Your Information</h3>

      <form id="profileForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="emailProfile" placeholder="Email" required>
        <input type="text" id="course" placeholder="Course">
        
        <button type="submit">💾 Save Profile</button>
      </form>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>

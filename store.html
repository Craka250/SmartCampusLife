<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
      <a href="library.html"><i class="fas fa-book"></i> Library</a>
      <a href="store.html"><i class="fas fa-shopping-cart"></i> Store</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h2>🛒 Campus Store</h2>
      <button onclick="toggleDarkMode()" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
      </button>
    </header>

    <!-- Products -->
    <section class="cards" id="productsContainer"></section>

    <!-- Cart -->
    <section class="task-list">
      <h3>🧾 Your Cart</h3>
      <div id="cartContainer"></div>

      <h3>Total: KES <span id="cartTotal">0</span></h3>

      <button onclick="checkout()">✅ Checkout</button>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>

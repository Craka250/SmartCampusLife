<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - Smart Campus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
  <div id="overlay" onclick="toggleMenu()"></div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>
    <nav>
      <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
      <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
      <a href="library.html"><i class="fas fa-book"></i> Library</a>
      <a href="store.html"><i class="fas fa-shopping-cart"></i> Store</a>
      <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
      <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h2>Task Manager</h2>
      <button onclick="toggleDarkMode()" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
      </button>
    </header>

    <!-- Stats -->
    <section class="cards">
      <div class="card"><h3>Total</h3><p id="totalTasks">0</p></div>
      <div class="card"><h3>Completed</h3><p id="completedTasks">0</p></div>
      <div class="card"><h3>Pending</h3><p id="pendingTasks">0</p></div>
    </section>

    <!-- Controls -->
    <section class="actions">
      <input type="text" id="searchTask" placeholder="🔍 Search tasks...">
      
      <div class="action-buttons">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
      </div>
    </section>

    <!-- Add Task -->
    <section class="task-form">
      <h3>Add / Edit Task</h3>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <input type="text" id="taskTitle" placeholder="Task title" required>
        <input type="date" id="taskDate" required>

        <select id="taskPriority">
          <option value="low">Low Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="high">High Priority</option>
        </select>

        <button type="submit">💾 Save Task</button>
      </form>
    </section>

    <!-- Task List -->
    <section class="task-list">
      <h3>Your Tasks</h3>
      <div id="tasksContainer"></div>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Smart Campus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
  <div id="overlay" onclick="toggleMenu()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>

    <nav>
      <a href="index.html" onclick="toggleMenu()">
        <i class="fas fa-home"></i> Dashboard
      </a>

      <a href="tasks.html" onclick="toggleMenu()">
        <i class="fas fa-tasks"></i> Tasks
      </a>

      <a href="library.html" onclick="toggleMenu()">
        <i class="fas fa-book"></i> Library
      </a>

      <a href="store.html" onclick="toggleMenu()">
        <i class="fas fa-shopping-cart"></i> Store
      </a>

      <a href="profile.html" onclick="toggleMenu()">
        <i class="fas fa-user"></i> Profile
      </a>

      <a href="settings.html" onclick="toggleMenu()">
        <i class="fas fa-cog"></i> Settings
      </a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle"
              onclick="toggleMenu()"
              aria-label="Open menu"
              title="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <h2>⚙️ Settings</h2>
    </header>

    <!-- Account Settings -->
    <section class="panel">
      <h3><i class="fas fa-user-cog"></i> Account Settings</h3>

      <div class="task-form">
        <form>
          <input type="text" placeholder="Full Name">
          <input type="email" placeholder="Email Address">
          <input type="password" placeholder="New Password">
          <button type="button" onclick="showNotification('Profile updated!')">
            Save Changes
          </button>
        </form>
      </div>
    </section>

    <!-- Preferences -->
    <section class="panel">
      <h3><i class="fas fa-sliders-h"></i> Preferences</h3>

      <div class="action-buttons">
        <button onclick="toggleDarkMode()">
          <i class="fas fa-moon"></i> Toggle Dark Mode
        </button>

        <button onclick="showNotification('Notifications updated!')">
          <i class="fas fa-bell"></i> Enable Notifications
        </button>

        <button onclick="showNotification('Language changed!')">
          <i class="fas fa-globe"></i> Change Language
        </button>
      </div>
    </section>

    <!-- Security -->
    <section class="panel">
      <h3><i class="fas fa-shield-alt"></i> Security</h3>

      <div class="action-buttons">
        <button onclick="showNotification('2FA Enabled!')">
          🔐 Enable 2FA
        </button>

        <button onclick="showNotification('Password reset link sent!')">
          🔑 Reset Password
        </button>
      </div>
    </section>

    <!-- System Settings -->
    <section class="panel">
      <h3><i class="fas fa-database"></i> System</h3>

      <div class="action-buttons">
        <button onclick="clearData()">
          🗑 Reset All Data
        </button>

        <button onclick="showNotification('Backup created!')">
          💾 Backup Data
        </button>
      </div>
    </section>

    <!-- About -->
    <section class="panel">
      <h3><i class="fas fa-info-circle"></i> About</h3>

      <p><strong>App Name:</strong> Smart Campus Life</p>
      <p><strong>Version:</strong> 1.0.0</p>
      <p><strong>Developer:</strong> You 😄</p>
    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>

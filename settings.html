<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Smart Campus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
  <div id="overlay" onclick="toggleMenu()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> Campus</h2>

    <nav>
      <a href="index.html" onclick="toggleMenu()">
        <i class="fas fa-home"></i> Dashboard
      </a>

      <a href="tasks.html" onclick="toggleMenu()">
        <i class="fas fa-tasks"></i> Tasks
      </a>

      <a href="library.html" onclick="toggleMenu()">
        <i class="fas fa-book"></i> Library
      </a>

      <a href="store.html" onclick="toggleMenu()">
        <i class="fas fa-shopping-cart"></i> Store
      </a>

      <a href="profile.html" onclick="toggleMenu()">
        <i class="fas fa-user"></i> Profile
      </a>

      <a href="settings.html" onclick="toggleMenu()">
        <i class="fas fa-cog"></i> Settings
      </a>

      <button onclick="logout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">
      <button class="menu-toggle"
              onclick="toggleMenu()"
              aria-label="Open menu"
              title="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <h2>⚙️ Settings</h2>
    </header>

    <section class="task-form">
      <h3>Preferences</h3>

      <button onclick="toggleDarkMode()" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
      </button>
      <button onclick="clearData()">🗑 Reset All Data</button>

    </section>

  </main>
</div>

<div id="toast"></div>

<script src="js/script.js"></script>
</body>
</html>
